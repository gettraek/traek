<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#00ffa3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0b0b0b"/>
  <!-- Branching node graph: root + two branches -->
  <!-- Root node -->
  <rect x="10" y="5" width="12" height="8" rx="2.5" fill="#1f1f1f" stroke="url(#g)" stroke-width="1.2"/>
  <!-- Branch lines -->
  <line x1="16" y1="13" x2="9" y2="19" stroke="rgba(0,216,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="13" x2="23" y2="19" stroke="rgba(0,255,163,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left child -->
  <rect x="3" y="19" width="12" height="8" rx="2.5" fill="#1f1f1f" stroke="rgba(0,216,255,0.6)" stroke-width="1.2"/>
  <!-- Right child -->
  <rect x="17" y="19" width="12" height="8" rx="2.5" fill="#1f1f1f" stroke="rgba(0,255,163,0.6)" stroke-width="1.2"/>
</svg>
