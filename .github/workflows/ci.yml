name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run tests with coverage
        run: pnpm --filter "@traek/svelte" exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=../../test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/svelte/coverage/
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f packages/svelte/coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const c = require('./packages/svelte/coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%  (' + m.covered + '/' + m.total + ')';
              console.log('Statements : ' + fmt(c.statements));
              console.log('Branches   : ' + fmt(c.branches));
              console.log('Functions  : ' + fmt(c.functions));
              console.log('Lines      : ' + fmt(c.lines));
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  e2e:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm --filter "@traek/web" exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: pnpm --filter "@traek/web" exec playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 30

  size:
    name: Package Size Check
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Check package sizes
        run: |
          echo "## Package Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Size (gzip) |" >> $GITHUB_STEP_SUMMARY
          echo "| ------- | ----------- |" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/*/; do
            pkgname=$(node -p "require('./$pkg/package.json').name" 2>/dev/null || true)
            if [ -z "$pkgname" ] || [ "$pkgname" = "undefined" ]; then continue; fi
            # Find main dist file
            distfile=""
            for candidate in "$pkg/dist/index.js" "$pkg/dist/index.mjs"; do
              if [ -f "$candidate" ]; then
                distfile="$candidate"
                break
              fi
            done
            if [ -n "$distfile" ]; then
              size=$(gzip -c "$distfile" | wc -c | tr -d ' ')
              echo "| \`$pkgname\` | ${size} bytes |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Size gate — warn if any package exceeds 500 KB gzip
        run: |
          FAIL=0
          for pkg in packages/*/; do
            for candidate in "$pkg/dist/index.js" "$pkg/dist/index.mjs"; do
              if [ -f "$candidate" ]; then
                size=$(gzip -c "$candidate" | wc -c | tr -d ' ')
                if [ "$size" -gt 512000 ]; then
                  echo "::warning file=$candidate::Gzip size ${size} bytes exceeds 500 KB threshold"
                fi
              fi
            done
          done
