name: Publish SDK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
      - name: Compare package version with published npm version
        id: check
        run: |
          LOCAL="$(node -p "require('./packages/sdk/package.json').version")"
          PUBLISHED="$(npm view traek version 2>/dev/null || echo 'none')"
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
            echo "traek@$LOCAL is already published — skipping publish."
          else
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            echo "traek@$LOCAL is not published yet (npm has $PUBLISHED) — will publish."
          fi

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run check
      - run: pnpm --filter traek exec vitest run

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [version, validate]
    if: needs.version.outputs.should-publish == 'true'
    permissions:
      contents: read
      id-token: write # Required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc' # Node 22.14+ / npm 11.5.1+ required for OIDC
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # Trusted publishing (OIDC): no NODE_AUTH_TOKEN. Ensure the package has
      # a trusted publisher on npm (Settings → Trusted publishing) with workflow
      # filename exactly "publish.yml" and this repo.
      - name: Publish
        run: pnpm --filter traek publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: '' # Force OIDC; remove any repo secret NPM_TOKEN/NODE_AUTH_TOKEN
