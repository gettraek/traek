<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    Træk Icon Sprite — 43 icons on a 24×24 grid
    Usage: <svg><use href="sprite.svg#icon-branch" /></svg>

    Visual language:
      Grid        24×24 px, 2 px safe-zone (live area 20×20)
      Stroke      2 px, round linecap + linejoin
      Corner      3 px for containers, 2 px for small shapes
      Style       Outline stroke + selective fill for dots/indicators
      Color       currentColor (inherits from CSS)
  -->

  <!-- ======================================================================
       NODE TYPE ICONS
       ====================================================================== -->

  <!-- node-text: document with text lines -->
  <symbol id="icon-node-text" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 9H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M7 12H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M7 15H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- node-code: document with </ > brackets -->
  <symbol id="icon-node-code" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 10L7 12L9 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 10L17 12L15 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M13.5 8.5L10.5 15.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- node-thought: document with thought-bubble (circle + dots) -->
  <symbol id="icon-node-thought" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12.5" cy="10.5" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="9" cy="15" r="1" fill="currentColor"/>
    <circle cx="12.5" cy="16" r="1" fill="currentColor"/>
    <circle cx="16" cy="15" r="1" fill="currentColor"/>
  </symbol>

  <!-- node-image: document with mountain silhouette + sun -->
  <symbol id="icon-node-image" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M3 16L8 10L12 14L15 11L21 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ======================================================================
       CANVAS ACTION ICONS
       ====================================================================== -->

  <!-- branch: Y-fork with filled node circles -->
  <symbol id="icon-branch" viewBox="0 0 24 24">
    <path d="M12 20V12M12 12L7 6M12 12L17 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="20.5" r="2" fill="currentColor"/>
    <circle cx="7" cy="5.5" r="2" fill="currentColor"/>
    <circle cx="17" cy="5.5" r="2" fill="currentColor"/>
  </symbol>

  <!-- collapse: chevron up (fold node) -->
  <symbol id="icon-collapse" viewBox="0 0 24 24">
    <path d="M6 15L12 9L18 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- expand: chevron down (unfold node) -->
  <symbol id="icon-expand" viewBox="0 0 24 24">
    <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- zoom-in: magnifying glass with plus -->
  <symbol id="icon-zoom-in" viewBox="0 0 24 24">
    <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M10 7V13M7 10H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M14.5 14.5L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- zoom-out: magnifying glass with minus -->
  <symbol id="icon-zoom-out" viewBox="0 0 24 24">
    <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M7 10H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M14.5 14.5L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- pan: four-directional arrows -->
  <symbol id="icon-pan" viewBox="0 0 24 24">
    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M9.5 7.5L12 5L14.5 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9.5 16.5L12 19L14.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7.5 9.5L5 12L7.5 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16.5 9.5L19 12L16.5 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- fit: frame corners (fit all in view) -->
  <symbol id="icon-fit" viewBox="0 0 24 24">
    <path d="M8 3H5C3.9 3 3 3.9 3 5V8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M21 8V5C21 3.9 20.1 3 19 3H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 16V19C3 20.1 3.9 21 5 21H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16 21H19C20.1 21 21 20.1 21 19V16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- snap-grid: 3×3 grid (center gap) -->
  <symbol id="icon-snap-grid" viewBox="0 0 24 24">
    <rect x="2" y="2" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="9.5" y="2" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="17" y="2" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="2" y="9.5" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="17" y="9.5" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="2" y="17" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="9.5" y="17" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="17" y="17" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- focus-mode: crosshair with center dot -->
  <symbol id="icon-focus-mode" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
    <path d="M12 2V5.5M12 18.5V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M2 12H5.5M18.5 12H22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- ======================================================================
       STATUS INDICATORS
       ====================================================================== -->

  <!-- streaming: three dots (AI generating) -->
  <symbol id="icon-streaming" viewBox="0 0 24 24">
    <circle cx="5" cy="12" r="2" fill="currentColor"/>
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
    <circle cx="19" cy="12" r="2" fill="currentColor"/>
  </symbol>

  <!-- done: checkmark in circle -->
  <symbol id="icon-done" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M7.5 12L10.5 15L16.5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- error: X in circle -->
  <symbol id="icon-error" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M8.5 8.5L15.5 15.5M15.5 8.5L8.5 15.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- warning: triangle with exclamation -->
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 9V13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M12 17H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- spinner: open arc (animate with CSS rotate) -->
  <symbol id="icon-spinner" viewBox="0 0 24 24">
    <path d="M12 2A10 10 0 0 1 22 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- ======================================================================
       TOOLBAR / UTILITY ICONS
       ====================================================================== -->

  <!-- send: paper-plane -->
  <symbol id="icon-send" viewBox="0 0 24 24">
    <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- search: magnifying glass -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M15 15L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- bookmark: flag ribbon -->
  <symbol id="icon-bookmark" viewBox="0 0 24 24">
    <path d="M5 3H19C19.6 3 20 3.4 20 4V21L12 17L4 21V4C4 3.4 4.4 3 5 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- tag: price-tag with dot -->
  <symbol id="icon-tag" viewBox="0 0 24 24">
    <path d="M3 3H11C11.5 3 12 3.2 12.4 3.6L20.4 11.6C21.2 12.4 21.2 13.6 20.4 14.4L14.4 20.4C13.6 21.2 12.4 21.2 11.6 20.4L3.6 12.4C3.2 12 3 11.5 3 11V3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
  </symbol>

  <!-- copy: overlapping rects -->
  <symbol id="icon-copy" viewBox="0 0 24 24">
    <rect x="8" y="8" width="13" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M8 8V5C8 3.9 8.9 3 10 3H19C20.1 3 21 3.9 21 5V14C21 15.1 20.1 16 19 16H16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- delete: trash can -->
  <symbol id="icon-delete" viewBox="0 0 24 24">
    <path d="M3 6H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 6V4H16V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M19 6L18 20H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 11V17M14 11V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- settings: two horizontal sliders -->
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <path d="M3 8H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M3 16H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <circle cx="16" cy="16" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- pin: thumbtack -->
  <symbol id="icon-pin" viewBox="0 0 24 24">
    <path d="M12 21V13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 13Q6.5 10 8 7Q9.5 5 12 5Q14.5 5 16 7Q17.5 10 16 13Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 13H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- link: chain links -->
  <symbol id="icon-link" viewBox="0 0 24 24">
    <path d="M9 14H7A5 5 0 0 1 7 4H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M15 10H17A5 5 0 0 1 17 20H15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M9 12H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- edit: pencil -->
  <symbol id="icon-edit" viewBox="0 0 24 24">
    <path d="M11 4H4A2 2 0 0 0 2 6V20A2 2 0 0 0 4 22H18A2 2 0 0 0 20 20V13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18.5 2.5A2.121 2.121 0 0 1 21.5 5.5L12 15L8 16L9 12L18.5 2.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- retry: circular arrow -->
  <symbol id="icon-retry" viewBox="0 0 24 24">
    <path d="M1 4V10H7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3.51 15A9 9 0 1 0 3.99 11.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- filter: funnel -->
  <symbol id="icon-filter" viewBox="0 0 24 24">
    <path d="M22 3H2L10 12.46V19L14 21V12.46L22 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- compare: side-by-side columns -->
  <symbol id="icon-compare" viewBox="0 0 24 24">
    <rect x="3" y="3" width="8" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <rect x="13" y="3" width="8" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- undo: counter-clockwise arrow -->
  <symbol id="icon-undo" viewBox="0 0 24 24">
    <path d="M3 7V13H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M21 17A9 9 0 0 0 12 8A9 9 0 0 0 5.7 10.3L3 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- redo: clockwise arrow -->
  <symbol id="icon-redo" viewBox="0 0 24 24">
    <path d="M21 7V13H15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 17A9 9 0 0 1 12 8A9 9 0 0 1 18.3 10.3L21 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- ======================================================================
       PRIMITIVES / CHEVRONS
       ====================================================================== -->

  <!-- close: X dismiss -->
  <symbol id="icon-close" viewBox="0 0 24 24">
    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- check: checkmark -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- chevron-down -->
  <symbol id="icon-chevron-down" viewBox="0 0 24 24">
    <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- chevron-up -->
  <symbol id="icon-chevron-up" viewBox="0 0 24 24">
    <path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- chevron-right -->
  <symbol id="icon-chevron-right" viewBox="0 0 24 24">
    <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- chevron-left -->
  <symbol id="icon-chevron-left" viewBox="0 0 24 24">
    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- node: generic circle node -->
  <symbol id="icon-node" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

</svg>
