services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHAT_DAILY_LIMIT_PER_IP=${CHAT_DAILY_LIMIT_PER_IP:-50}

  docs:
    build:
      context: .
      dockerfile: docker/docs.Dockerfile
    ports:
      - '4321:80'

  mcp:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    ports:
      - '3010:3010'
    environment:
      - PORT=3010
      # Bind to all interfaces inside the container; the host port mapping
      # controls external exposure. Host header validation stays off unless
      # MCP_ALLOWED_HOSTS is provided.
      - MCP_HOST=0.0.0.0
      - MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-}
